name: Build Windows Controlled-Only

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "15"

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-windows-${{ hashFiles('Cargo.toml') }}

      - name: Install vcpkg dependencies
        run: |
          vcpkg install --classic libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static
        env:
          VCPKG_DEFAULT_TRIPLET: x64-windows-static

      - name: Flutter pub get
        working-directory: flutter
        run: flutter pub get

      - name: Patch UI - Hide controller (remote tab)
        shell: python
        run: |
          import pathlib, re

          # Patch desktop_home_page.dart - hide remote/connection tab
          targets = [
            "flutter/lib/desktop/pages/desktop_home_page.dart",
            "flutter/lib/desktop/pages/connection_page.dart",
          ]
          replacements = [
            ("RemoteTab()", "Container()"),
            ("ConnectionPage()", "Container()"),
            ("_buildRemoteTab()", "Container()"),
            ("_ConnectionPage()", "Container()"),
          ]
          for path in targets:
            p = pathlib.Path(path)
            if not p.exists():
              print(f"Skip (not found): {path}")
              continue
            content = p.read_text(encoding="utf-8")
            changed = False
            for old, new in replacements:
              if old in content:
                content = content.replace(old, new)
                print(f"Patched [{path}]: {old} -> {new}")
                changed = True
            if changed:
              p.write_text(content, encoding="utf-8")

      - name: Build Rust dependencies
        run: cargo build --release
        env:
          VCPKG_ROOT: C:\vcpkg
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

      - name: Build Flutter Windows app
        working-directory: flutter
        run: flutter build windows --release
        env:
          VCPKG_ROOT: C:\vcpkg
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

      - name: Collect build output
        run: |
          mkdir -p output
          xcopy /E /I flutter\build\windows\x64\runner\Release output\rustdesk-controlled
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-controlled-only
          path: output\rustdesk-controlled\
          retention-days: 14
